packages:
  - '.'

blockExoticSubdeps: false
shamefullyHoist: true
allowBuilds:
  chromedriver: false
  core-js: false
  scratch-blocks: true
ignoredBuiltDependencies:
  - chromedriver
  - core-js
onlyBuiltDependencies:
  - '@parcel/watcher'
  - core-js-pure
  - react-markdown
  - scratch-blocks
  - scratch-extension-editor
  - scratch-vm
